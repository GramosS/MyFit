<!DOCTYPE html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyFit – Ditt fitness-verktyg</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="top-nav">
      <div class="logo">MyFit</div>
    </header>

    <main>
      <section class="hero">
        <div class="hero-overlay"></div>
        <div class="hero-content">
          <h1>
            <span>Din fitness.</span><br />
            <span class="highlight">Ditt verktyg.</span>
          </h1>
          <p>
            Logga träning, spåra kalorier och följ din vikt – allt i en snygg
            app som körs direkt i din webbläsare.
          </p>
          <div class="hero-actions">
            <button class="cta-button primary" id="get-started-btn">
              Kom igång
            </button>
            <button class="cta-button secondary" id="explore-btn">
              Utforska funktioner
            </button>
          </div>
          <div class="scroll-indicator" aria-hidden="true">
            <div class="mouse">
              <div class="wheel"></div>
            </div>
          </div>
        </div>
      </section>

      <section class="value-strip">
        <div class="value-item">
          <span class="value-number">100%</span>
          <span class="value-label">Gratis</span>
        </div>
        <div class="value-item">
          <span class="value-number">0</span>
          <span class="value-label">Inloggningar krävs</span>
        </div>
        <div class="value-item">
          <span class="value-number">∞</span>
          <span class="value-label">Lokal lagring</span>
        </div>
        <div class="value-item">
          <span class="value-number">24/7</span>
          <span class="value-label">Tillgänglig offline</span>
        </div>
      </section>
    </main>

    <footer class="page-footer">
      <p>Proof of Concept · Fitness Tracker · 2026</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
